name: Build GameHub iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Install tools
        run: |
          brew install xcodegen cmake

      # ==========================================
      # Step 1: Build Box64 static library for iOS
      # ==========================================
      - name: Clone Box64
        run: |
          if [ ! -d "Box64Source/box64" ]; then
            git clone --depth 1 https://github.com/ptitSeb/box64.git Box64Source/box64
          fi

      - name: Build Box64 for iOS
        run: |
          echo "=========================================="
          echo "  Compiling Box64 for iOS ARM64"
          echo "=========================================="
          
          BOX64_SRC="$PWD/Box64Source/box64"
          OUTPUT_DIR="$PWD/GameHub/Native/Box64Lib"
          mkdir -p "$OUTPUT_DIR/objects"
          
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          CC=$(xcrun --sdk iphoneos --find clang)
          AR=$(xcrun --sdk iphoneos --find ar)
          
          COMPAT_DIR="$PWD/GameHub/Native/Compat"
          CFLAGS="-arch arm64 -mios-version-min=16.0 -isysroot $SDK -O2 -fembed-bitcode-marker"
          CFLAGS="$CFLAGS -DARM64 -DDYNAREC -DNOGIT -D__IOS__=1 -DTARGET_IPHONE=1"
          CFLAGS="$CFLAGS -DBAD_SIGNAL=1 -DBOX64_ENV=1"
          CFLAGS="$CFLAGS -I$COMPAT_DIR -I$BOX64_SRC/src/include -I$BOX64_SRC/src"
          CFLAGS="$CFLAGS -Wno-unused-variable -Wno-unused-function -Wno-incompatible-pointer-types"
          CFLAGS="$CFLAGS -Wno-int-conversion -Wno-pointer-sign -Wno-implicit-function-declaration"
          CFLAGS="$CFLAGS -Wno-deprecated-declarations -Wno-missing-declarations"
          CFLAGS="$CFLAGS -Wno-missing-prototypes -Wno-strict-prototypes"
          
          # Collect source files from Box64
          SOURCES=""
          for dir in src src/emu src/custommem src/os src/tools src/libtools; do
              if [ -d "$BOX64_SRC/$dir" ]; then
                  for f in "$BOX64_SRC/$dir"/*.c; do
                      [ -f "$f" ] && SOURCES="$SOURCES $f"
                  done
              fi
          done
          
          # Dynarec ARM64 sources
          if [ -d "$BOX64_SRC/src/dynarec" ]; then
              for f in "$BOX64_SRC/src/dynarec"/*.c; do
                  [ -f "$f" ] && SOURCES="$SOURCES $f"
              done
              if [ -d "$BOX64_SRC/src/dynarec/arm64" ]; then
                  for f in "$BOX64_SRC/src/dynarec/arm64"/*.c "$BOX64_SRC/src/dynarec/arm64"/*.S; do
                      [ -f "$f" ] && SOURCES="$SOURCES $f"
                  done
              fi
          fi
          
          # Wrapped library sources
          if [ -d "$BOX64_SRC/src/wrapped" ]; then
              for f in "$BOX64_SRC/src/wrapped"/*.c; do
                  [ -f "$f" ] && SOURCES="$SOURCES $f"
              done
          fi
          
          SRC_COUNT=$(echo $SOURCES | wc -w)
          echo "Found $SRC_COUNT source files"
          
          COMPILED=0
          FAILED=0
          
          for src in $SOURCES; do
              BASENAME=$(basename "$src" .c)
              OBJ="$OUTPUT_DIR/objects/${BASENAME}.o"
              
              if [[ "$src" == *.S ]]; then
                  # Assembly file
                  if $CC $CFLAGS -c "$src" -o "$OBJ" 2>/dev/null; then
                      COMPILED=$((COMPILED + 1))
                  else
                      FAILED=$((FAILED + 1))
                  fi
              else
                  if $CC $CFLAGS -c "$src" -o "$OBJ" 2>/dev/null; then
                      COMPILED=$((COMPILED + 1))
                  else
                      FAILED=$((FAILED + 1))
                  fi
              fi
          done
          
          echo "Compiled: $COMPILED / $SRC_COUNT"
          echo "Failed: $FAILED"
          
          if [ $COMPILED -gt 0 ]; then
              cd "$OUTPUT_DIR/objects"
              $AR rcs "$OUTPUT_DIR/libbox64.a" *.o
              echo "Created libbox64.a:"
              ls -la "$OUTPUT_DIR/libbox64.a"
          else
              echo "ERROR: No Box64 files compiled"
              exit 1
          fi

      # ==========================================
      # Step 2: Build iOS App with Box64 linked
      # ==========================================
      - name: Remove old xcodeproj
        run: rm -rf GameHub.xcodeproj

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show targets
        run: xcodebuild -project GameHub.xcodeproj -list

      - name: Build iOS App
        run: |
          set +e
          xcodebuild \
            -project GameHub.xcodeproj \
            -scheme GameHub \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log
          XCODEBUILD_EXIT=${PIPESTATUS[0]}
          set -e
          echo "xcodebuild exit code: $XCODEBUILD_EXIT"
          echo "---BUILD LOG TAIL---"
          tail -200 build.log
          exit $XCODEBUILD_EXIT

      - name: Show build errors
        if: failure()
        run: |
          echo "### BUILD ERRORS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f build.log ]; then
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -i "error\|fatal\|cannot\|missing\|not found\|no such" build.log | head -50 >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Last 150 lines:" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -150 build.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No build.log file found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Verify build output
        run: |
          echo "=== Looking for built app ==="
          echo "DerivedData contents:"
          find build/DerivedData -maxdepth 3 -type d 2>/dev/null | head -40 || true
          echo ""
          echo "Searching for .app bundles:"
          find build/DerivedData -name "*.app" -type d 2>/dev/null || true
          echo ""
          echo "Searching for GameHub binary:"
          find build/DerivedData -name "GameHub" -type f 2>/dev/null || true
          echo ""
          
          # Try standard DerivedData path structure
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/GameHub.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find build/DerivedData -name "GameHub.app" -type d 2>/dev/null | head -1)
          fi
          
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "ERROR: GameHub.app not found!"
            echo "=== Build log errors ==="
            grep -i "error\|fatal\|cannot\|missing" build.log 2>/dev/null | head -30 || true
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          echo "=== App contents ==="
          ls -la "$APP_PATH/"
          echo ""
          echo "=== Binary check ==="
          if [ -f "$APP_PATH/GameHub" ]; then
            file "$APP_PATH/GameHub"
            ls -la "$APP_PATH/GameHub"
          else
            echo "Binary GameHub not found directly, checking subdirs..."
            find "$APP_PATH" -type f | head -20 || true
          fi

      - name: Create IPA
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/GameHub.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find build/DerivedData -name "GameHub.app" -type d | head -1)
          fi
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Cannot create IPA - GameHub.app not found"
            exit 1
          fi
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/GameHub.app
          cd build
          zip -r -y GameHub.ipa Payload/
          echo "=== IPA info ==="
          ls -la GameHub.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameHub-iOS
          path: build/GameHub.ipa
          retention-days: 30

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "GameHub iOS Build #${{ github.run_number }}"
          body: |
            GameHub iOS - PC Game Emulator for iPhone & iPad
            
            **Installation:**
            1. Download GameHub.ipa below
            2. Install via LiveContainer, SideStore, AltStore, or TrollStore
            3. For best performance: Use StikDebug to enable JIT
            
            **Components:**
            - Box64 x86_64 to ARM64 translation (compiled from source)
            - Wine 9.0 Windows API (downloaded at runtime)
            - MoltenVK (Vulkan to Metal)
            - DXVK (DirectX 11 to Vulkan)
            - VKD3D (DirectX 12 to Vulkan)
            
            Supports iPhone & iPad (iOS 16+)
          files: build/GameHub.ipa
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "========================================"
          if [ -f build/GameHub.ipa ]; then
            SIZE=$(ls -la build/GameHub.ipa | awk '{print $5}')
            echo "  BUILD SUCCESS!"
            echo "  IPA size: $SIZE bytes"
          else
            echo "  BUILD FAILED"
            tail -40 build.log || true
          fi
          echo "========================================"
