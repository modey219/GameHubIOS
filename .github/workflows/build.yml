name: Build GameHub iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Fix all line endings
        run: |
          find . -name "*.pbxproj" -exec perl -pi -e 's/\r\n/\n/g' {} +
          find . -name "*.xcscheme" -exec perl -pi -e 's/\r\n/\n/g' {} +
          find . -name "*.xcworkspacedata" -exec perl -pi -e 's/\r\n/\n/g' {} +
          find . -name "*.plist" -exec perl -pi -e 's/\r\n/\n/g' {} +
          echo "Line endings fixed"

      - name: Validate project file
        run: |
          echo "=== First bytes of pbxproj (hex) ==="
          xxd GameHub.xcodeproj/project.pbxproj | head -5
          echo "=== plutil check ==="
          plutil -lint GameHub.xcodeproj/project.pbxproj || true
          echo "=== Files in xcodeproj ==="
          find GameHub.xcodeproj -type f

      - name: Build iOS App
        run: |
          xcodebuild \
            -project GameHub.xcodeproj \
            -scheme GameHub \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

      - name: Create IPA
        run: |
          echo "Looking for built app..."
          find build/DerivedData -name "GameHub.app" -type d 2>/dev/null || true
          find build/DerivedData -name "*.app" -type d 2>/dev/null || true
          
          APP_PATH=$(find build/DerivedData -name "GameHub.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: GameHub.app not found!"
            echo "=== Build log tail ==="
            tail -100 build.log || true
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r GameHub.ipa Payload/
          echo "IPA created: build/GameHub.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GameHub-iOS
          path: build/GameHub.ipa
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "========================================"
          if [ -f build/GameHub.ipa ]; then
            echo "  BUILD SUCCESS!"
            echo "  IPA: Artifacts -> GameHub-iOS"
          else
            echo "  BUILD FAILED"
            echo "  Check the logs above for errors"
          fi
          echo "========================================"
