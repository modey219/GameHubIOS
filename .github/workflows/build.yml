name: Build GameHub iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Install tools
        run: |
          brew install xcodegen cmake

      # ==========================================
      # Step 1: Build Box64 executable for iOS
      # ==========================================
      - name: Clone Box64
        run: |
          if [ ! -d "Box64Source/box64" ]; then
            git clone --depth 1 https://github.com/ptitSeb/box64.git Box64Source/box64
          fi

      - name: Build Box64 for iOS
        run: |
          echo "=========================================="
          echo "  Compiling Box64 for iOS ARM64"
          echo "=========================================="
          
          BOX64_SRC="$PWD/Box64Source/box64"
          OUTPUT_DIR="$PWD/GameHub/Native/Box64Lib"
          mkdir -p "$OUTPUT_DIR/objects"
          
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          CC=$(xcrun --sdk iphoneos --find clang)
          AR=$(xcrun --sdk iphoneos --find ar)
          
          COMPAT_DIR="$PWD/GameHub/Native/Compat"
          
          # Build include flags: our compat dir FIRST to override system headers
          INC_FLAGS="-I$COMPAT_DIR -I$BOX64_SRC/src/include -I$BOX64_SRC/src"
          while IFS= read -r d; do
              INC_FLAGS="$INC_FLAGS -I$d"
          done < <(find "$BOX64_SRC/src" -type d)
          
          CFLAGS="-arch arm64 -mios-version-min=16.0 -isysroot $SDK -O2 -fembed-bitcode-marker"
          CFLAGS="$CFLAGS -DARM64 -DDYNAREC -DNOGIT -D__IOS__=1 -DTARGET_IPHONE=1"
          CFLAGS="$CFLAGS -DBAD_SIGNAL=1 -DBOX64_ENV=1 -D_XOPEN_SOURCE=600 -D_DARWIN_C_SOURCE"
          CFLAGS="$CFLAGS $INC_FLAGS"
          CFLAGS="$CFLAGS -Wno-unused-variable -Wno-unused-function -Wno-incompatible-pointer-types"
          CFLAGS="$CFLAGS -Wno-int-conversion -Wno-pointer-sign -Wno-implicit-function-declaration"
          CFLAGS="$CFLAGS -Wno-deprecated-declarations -Wno-missing-declarations"
          CFLAGS="$CFLAGS -Wno-missing-prototypes -Wno-strict-prototypes"
          CFLAGS="$CFLAGS -Wno-macro-redefined -Wno-error"
          CFLAGS="$CFLAGS -include $COMPAT_DIR/ios_linux_compat.h"
          CFLAGS="$CFLAGS -DSTEP=1 -DSTACKALIGN=16"
          
          # Exclude files that cannot compile on Darwin
          EXCLUDE="custommmap.c emit_signal_wine.c os_wine.c hostext_wine.c random_wine.c emit_signals_linux.c freq_linux.c hostext_linux.c os_linux.c obstack.c threads32.c dynacache.c signals.c signal32.c sigtools.c syscall_user_dispatch.c dynarec_arm64_arch.c elfhacks.c my_x11_xevent.c myalign64_32.c myalignxcb32.c sdl1rwops.c sdl2rwops.c libc_net32.c arm64_printer.c threads.c myalign32.c libdl.c symbolfuncs_linux.c mallochook.c elfload_dump.c elfload_dump32.c x86int3.c elfhash32.c box32stack.c globalsymbols32.c"
          
          # Find core .c files under src/ (excluding wrapped/ and wrapped32/ — Linux-only libs)
          SOURCES=""
          for dir in src src/emu src/custommem src/os src/tools src/libtools src/elfs src/librarian; do
              if [ -d "$BOX64_SRC/$dir" ]; then
                  for f in "$BOX64_SRC/$dir"/*.c; do
                      [ -f "$f" ] || continue
                      BASE=$(basename "$f")
                      SKIP=0
                      for ex in $EXCLUDE; do [ "$BASE" = "$ex" ] && SKIP=1 && break; done
                      [ $SKIP -eq 0 ] && SOURCES="$SOURCES $f"
                  done
              fi
          done
          
          # Skip ALL wrapped/ files — Linux-only library wrappers (GTK, X11, Wayland, PulseAudio, ICU etc.)
          # Not needed for Wine on iOS. Only core libc/libm/libpthread would be needed but those are provided by system.
          
          # Include dynarec (EXCLUDE avx_, problematic .S, and STEP-dependent files)
          if [ -d "$BOX64_SRC/src/dynarec" ]; then
              for f in "$BOX64_SRC/src/dynarec"/*.c; do
                  [ -f "$f" ] || continue
                  BASE=$(basename "$f")
                  case "$BASE" in *avx*) continue;; esac
                  SKIP=0
                  for ex in $EXCLUDE; do [ "$BASE" = "$ex" ] && SKIP=1 && break; done
                  [ $SKIP -eq 0 ] && SOURCES="$SOURCES $f"
              done
              if [ -d "$BOX64_SRC/src/dynarec/arm64" ]; then
                  for f in "$BOX64_SRC/src/dynarec/arm64"/*.c "$BOX64_SRC/src/dynarec/arm64"/*.S; do
                      [ -f "$f" ] || continue
                      BASE=$(basename "$f")
                      # Skip AVX files
                      case "$BASE" in *avx*) continue;; esac
                      # Skip problematic assembly (LSE instructions, undefined locals, iOS incompat)
                      case "$BASE" in arm64_lock.S|arm64_next.S|arm64_epilog.S|arm64_prolog.S) continue;; esac
                      SKIP=0
                      for ex in $EXCLUDE; do [ "$BASE" = "$ex" ] && SKIP=1 && break; done
                      [ $SKIP -eq 0 ] && SOURCES="$SOURCES $f"
                  done
              fi
          fi
          
          # Add our iOS stubs
          SOURCES="$SOURCES $PWD/GameHub/Native/SyscallTranslation/ios_stubs.c"
          
          SRC_COUNT=$(echo $SOURCES | wc -w)
          echo "Found $SRC_COUNT source files"
          
          COMPILED=0
          FAILED=0
          
          for src in $SOURCES; do
              OBJ="$OUTPUT_DIR/objects/$(basename "$src" .c).o"
              
              if $CC $CFLAGS -c "$src" -o "$OBJ" 2>/tmp/box64_err_$$; then
                  COMPILED=$((COMPILED + 1))
              else
                  FAILED=$((FAILED + 1))
                  LAST_ERR=$(cat /tmp/box64_err_$$ 2>/dev/null | grep -i "error:" | head -1)
                  if [ -z "$LAST_ERR" ]; then
                      LAST_ERR=$(cat /tmp/box64_err_$$ 2>/dev/null | tail -1)
                  fi
                  echo "FAIL: $(basename "$src"): $LAST_ERR"
              fi
              rm -f /tmp/box64_err_$$
          done
          
          echo ""
          echo "Compiled: $COMPILED / $SRC_COUNT (Failed: $FAILED)"
          
          if [ $COMPILED -gt 0 ]; then
              # Create static library
              cd "$OUTPUT_DIR/objects"
              $AR rcs "$OUTPUT_DIR/libbox64.a" *.o
              echo "Created libbox64.a: $(ls -lh "$OUTPUT_DIR/libbox64.a")"
              
              # Auto-generate stubs for all undefined symbols
              echo "Generating stubs for undefined symbols..."
              cd "$OUTPUT_DIR"
              
              # Find undefined symbols not defined in our objects
              # Use robust approach: undefined = symbols with ' U ' in nm output
              nm objects/*.o 2>/dev/null | grep ' U ' | awk '{print $NF}' | sed 's/^_//' | sort -u > /tmp/all_undef.txt
              
              # Defined = everything else (T, D, B, A, R, C, c, S, s, t, d, b, a, r, g, G, W, w, etc.)
              nm objects/*.o 2>/dev/null | grep -v ' U ' | awk '{print $NF}' | sed 's/^_//' | sort -u > /tmp/all_def.txt
              
              # Missing = undefined in our objects, not defined in our objects
              comm -23 /tmp/all_undef.txt /tmp/all_def.txt > /tmp/missing_syms.txt
              
              MISSING_COUNT=$(wc -l < /tmp/missing_syms.txt)
              echo "Total missing symbols: $MISSING_COUNT"
              head -20 /tmp/missing_syms.txt
              
              # Remove symbols that are already defined in our objects (prevent duplicates)
              comm -12 /tmp/all_def.txt /tmp/missing_syms.txt > /tmp/dup_syms.txt
              DUP_COUNT=$(wc -l < /tmp/dup_syms.txt)
              if [ "$DUP_COUNT" -gt 0 ]; then
                  echo "Removing $DUP_COUNT already-defined symbols from stubs"
                  comm -23 /tmp/missing_syms.txt /tmp/all_def.txt > /tmp/missing_syms_final.txt
              else
                  cp /tmp/missing_syms.txt /tmp/missing_syms_final.txt
              fi
              
              # Generate stubs C file — NO system headers at all to avoid macro conflicts
              {
                  echo '// Auto-generated stubs for missing Box64 symbols on iOS'
                  echo '// No system headers to avoid macro expansion errors'
                  echo ''
                  while IFS= read -r sym; do
                      [ -z "$sym" ] && continue
                      # Don't skip underscore symbols — __libc_* etc. are real refs
                      echo "void $sym(void) {}"
                  done < /tmp/missing_syms_final.txt
              } > auto_stubs.c
              
              STUB_LINES=$(wc -l < auto_stubs.c)
              echo "Generated $STUB_LINES lines of stubs"
              
              # Compile stubs — no warnings, no system headers needed
              $CC -arch arm64 -mios-version-min=16.0 -isysroot "$SDK" \
                  -w -ffreestanding -nostdinc \
                  -c auto_stubs.c -o auto_stubs.o
              
              # Post-compile: find any duplicate symbols between stubs and objects
              # and remove them by filtering stubs
              STUB_DEFS=$(nm auto_stubs.o 2>/dev/null | awk '{print $NF}' | sed 's/^_//' | sort -u)
              OBJ_DEFS=$(nm objects/*.o 2>/dev/null | grep -v ' U ' | awk '{print $NF}' | sed 's/^_//' | sort -u)
              DUPS=$(comm -12 <(echo "$STUB_DEFS") <(echo "$OBJ_DEFS"))
              DUP_COUNT=$(echo "$DUPS" | grep -c . || true)
              if [ "$DUP_COUNT" -gt 0 ]; then
                  echo "Post-compile: filtering $DUP_COUNT duplicate symbols from stubs"
                  # Re-generate stubs excluding duplicates
                  {
                      echo '// Auto-generated stubs (deduplicated)'
                      while IFS= read -r sym; do
                          [ -z "$sym" ] && continue
                          echo "void $sym(void) {}"
                      done < <(comm -23 <(echo "$STUB_DEFS") <(echo "$OBJ_DEFS"))
                  } > auto_stubs_dedup.c
                  $CC -arch arm64 -mios-version-min=16.0 -isysroot "$SDK" \
                      -w -ffreestanding -nostdinc \
                      -c auto_stubs_dedup.c -o auto_stubs.o
                  echo "Recompiled deduplicated stubs"
              fi
              
              # Link as executable with stubs
              $CC -arch arm64 -mios-version-min=16.0 -isysroot "$SDK" \
                  objects/*.o auto_stubs.o \
                  -o box64 -lm
              chmod 755 box64
              echo "Created box64 executable: $(ls -la box64)"
          else
              echo "ERROR: No Box64 files compiled"
              exit 1
          fi

      # ==========================================
      # Step 2: Download Wine, MoltenVK, DXVK
      # ==========================================
      - name: Download Wine (x86_64 Linux for Box64)
        run: |
          echo "=========================================="
          echo "  Downloading Wine for Box64"
          echo "=========================================="
          WINE_VERSION="9.21"
          WINE_URL="https://github.com/Kron4ek/Wine-Builds/releases/download/${WINE_VERSION}/wine-${WINE_VERSION}-amd64.tar.xz"
          echo "Downloading: $WINE_URL"
          curl -L "$WINE_URL" -o wine-amd64.tar.xz
          mkdir -p GameHub/Native/BundledBinaries/Wine
          tar xf wine-amd64.tar.xz -C GameHub/Native/BundledBinaries/Wine --strip-components=1
          rm -f wine-amd64.tar.xz
          echo "Wine contents:"
          ls -la GameHub/Native/BundledBinaries/Wine/
          ls -la GameHub/Native/BundledBinaries/Wine/bin/ 2>/dev/null || true

      - name: Download MoltenVK (iOS)
        run: |
          echo "=========================================="
          echo "  Downloading MoltenVK for iOS"
          echo "=========================================="
          MVK_URL="https://github.com/KhronosGroup/MoltenVK/releases/download/v1.4.1/MoltenVK-ios.tar"
          echo "Downloading: $MVK_URL"
          curl -L "$MVK_URL" -o MoltenVK-ios.tar
          echo "=== MoltenVK tar structure ==="
          tar tf MoltenVK-ios.tar 2>/dev/null | head -30
          mkdir -p GameHub/Native/BundledBinaries/MoltenVK
          tar xf MoltenVK-ios.tar -C GameHub/Native/BundledBinaries/MoltenVK --strip-components=1 2>/dev/null || \
          tar xf MoltenVK-ios.tar -C GameHub/Native/BundledBinaries/MoltenVK --strip-components=0
          rm -f MoltenVK-ios.tar
          echo "=== Removing broken symlinks ==="
          find GameHub/Native/BundledBinaries/MoltenVK -type l ! -exec test -e {} \; -delete 2>/dev/null || true
          echo "MoltenVK contents:"
          find GameHub/Native/BundledBinaries/MoltenVK -type f -o -type l | head -30

      - name: Download DXVK (Windows DLLs for Wine)
        run: |
          echo "=========================================="
          echo "  Downloading DXVK"
          echo "=========================================="
          DXVK_URL="https://github.com/doitsujin/dxvk/releases/download/v2.6.1/dxvk-2.6.1.tar.gz"
          echo "Downloading: $DXVK_URL"
          curl -L "$DXVK_URL" -o dxvk.tar.gz
          mkdir -p GameHub/Native/BundledBinaries/DXVK
          tar xf dxvk.tar.gz -C GameHub/Native/BundledBinaries/DXVK --strip-components=1
          rm -f dxvk.tar.gz
          echo "DXVK contents:"
          find GameHub/Native/BundledBinaries/DXVK -type f | head -20

      - name: Bundle all binaries
        run: |
          echo "=========================================="
          echo "  Bundling all binaries into BundledBinaries"
          echo "=========================================="
          BIN_DIR="GameHub/Native/BundledBinaries"
          
          # Copy box64 executable into BundledBinaries (both root for direct access and Box64/ for organization)
          cp GameHub/Native/Box64Lib/box64 "$BIN_DIR/box64"
          chmod 755 "$BIN_DIR/box64"
          
          # Verify everything is in place
          echo "--- Box64 ---"
          ls -lh "$BIN_DIR/box64"
          echo "--- Wine ---"
          ls -lh "$BIN_DIR/Wine/bin/wine64" 2>/dev/null || echo "wine64: MISSING"
          echo "--- MoltenVK ---"
          find "$BIN_DIR/MoltenVK" -name "*.dylib" -o -name "libvulkan*" | head -5 || echo "MoltenVK: MISSING"
          echo "--- DXVK ---"
          find "$BIN_DIR/DXVK" -name "*.dll" | head -10 || echo "DXVK: MISSING"
          echo "--- Total size ---"
          du -sh "$BIN_DIR"

      # ==========================================
      # Step 3: Build iOS App with bundled binaries
      # ==========================================
      - name: Generate app icons
        run: |
          ICONSET="GameHub/Resources/Assets.xcassets/AppIcon.appiconset"
          # Generate a proper 1024x1024 icon with gradient using macOS sips/imagemagick
          if command -v convert &>/dev/null; then
            convert -size 1024x1024 gradient:"#3a1c71-#d76d77" \
              -gravity center -fill white -font Helvetica -pointsize 200 \
              -annotate +0+0 "GH" "$ICONSET/icon-1024.png"
          else
            # Use Python to generate a simple blue gradient icon
            python3 -c "
          import struct, zlib
          def create_png(w, h, r, g, b):
              raw = b''
              for y in range(h):
                  raw += b'\x00'
                  for x in range(w):
              cr = max(0, min(255, r + (y * 80 // h)))
              cg = max(0, min(255, g - (y * 40 // h)))
              cb = max(0, min(255, b - (y * 60 // h)))
                      raw += struct.pack('BBBB', cr, cg, cb, 255)
              def chunk(ctype, data):
                  c = ctype + data
                  return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 6, 0, 0, 0)
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', zlib.compress(raw)) + chunk(b'IEND', b'')
          iconset = '$ICONSET'
          sizes = {
              'icon-20.png': 20, 'icon-20@2x.png': 40, 'icon-20@3x.png': 60,
              'icon-29.png': 29, 'icon-29@2x.png': 58, 'icon-29@3x.png': 87,
              'icon-40.png': 40, 'icon-40@2x.png': 80, 'icon-40@3x.png': 120,
              'icon-60.png': 60, 'icon-60@2x.png': 120, 'icon-60@3x.png': 180,
              'icon-76.png': 76, 'icon-76@2x.png': 152,
              'icon-83.5@2x.png': 167, 'icon-1024.png': 1024,
          }
          for name, size in sizes.items():
              with open(f'{iconset}/{name}', 'wb') as f:
                  f.write(create_png(size, size, 58, 28, 113))
          print('Icons generated')
          "
          fi
          # Verify
          ls -la "$ICONSET/icon-1024.png"

      - name: Remove old xcodeproj
        run: rm -rf GameHub.xcodeproj

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show targets
        run: |
          xcodebuild -project GameHub.xcodeproj -list

      - name: Build iOS App
        run: |
          set -o pipefail
          xcodebuild \
            -project GameHub.xcodeproj \
            -scheme GameHub \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

      - name: Dump build log on failure
        if: failure()
        run: |
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -300 build.log >> $GITHUB_STEP_SUMMARY 2>/dev/null || true
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 5

      - name: Inject bundled binaries into .app
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/GameHub.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find build/DerivedData -name "GameHub.app" -type d 2>/dev/null | head -1)
          fi
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "ERROR: GameHub.app not found!"
            grep -i "error\|fatal\|cannot\|missing" build.log 2>/dev/null | head -30 || true
            exit 1
          fi
          echo "Found app at: $APP_PATH"
          
          BIN_SRC="GameHub/Native/BundledBinaries"
          BIN_DST="$APP_PATH/BundledBinaries"
          rm -rf "$BIN_DST"
          mkdir -p "$BIN_DST"
          
          echo "=== Copying box64 ==="
          cp "$BIN_SRC/box64" "$BIN_DST/box64"
          chmod 755 "$BIN_DST/box64"
          
          echo "=== Copying Wine ==="
          cp -R "$BIN_SRC/Wine" "$BIN_DST/"
          
          echo "=== Copying MoltenVK ==="
          find "$BIN_SRC/MoltenVK" -type f | head -10
          cp -R "$BIN_SRC/MoltenVK" "$BIN_DST/"
          
          echo "=== Copying DXVK ==="
          find "$BIN_SRC/DXVK" -type f -name "*.dll" | head -5
          cp -R "$BIN_SRC/DXVK" "$BIN_DST/"
          
          echo "=== App size after injection ==="
          du -sh "$APP_PATH"
          echo "=== Bundled binaries in app ==="
          find "$BIN_DST" -name "box64" -o -name "wine64" -o -name "*.dylib" -o -name "*.dll" 2>/dev/null | head -20
          echo "=== All files in BundledBinaries ==="
          find "$BIN_DST" -type f | wc -l

      - name: Create IPA
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/GameHub.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH=$(find build/DerivedData -name "GameHub.app" -type d | head -1)
          fi
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Cannot create IPA - GameHub.app not found"
            exit 1
          fi
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/GameHub.app
          cd build
          zip -r -y GameHub.ipa Payload/
          echo "=== IPA info ==="
          ls -lh GameHub.ipa
          echo "=== IPA size ==="
          du -sh GameHub.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameHub-iOS
          path: build/GameHub.ipa
          retention-days: 30

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "GameHub iOS Build #${{ github.run_number }}"
          body: |
            GameHub iOS - PC Game Emulator for iPhone & iPad
            
            **Installation:**
            1. Download GameHub.ipa below
            2. Install via LiveContainer, SideStore, AltStore, or TrollStore
            3. For best performance: Use StikDebug to enable JIT
            
            **All-in-one IPA (no downloads needed):**
            - Box64 x86_64 to ARM64 translation (compiled from source)
            - Wine 9.21 (x86_64 Linux, runs via Box64)
            - MoltenVK 1.4.1 (Vulkan to Metal)
            - DXVK 2.6.1 (DirectX 11 to Vulkan)
            
            Supports iPhone & iPad (iOS 16+)
          files: build/GameHub.ipa
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: always()
        run: |
          echo "========================================"
          if [ -f build/GameHub.ipa ]; then
            SIZE=$(ls -lh build/GameHub.ipa | awk '{print $5}')
            echo "  BUILD SUCCESS!"
            echo "  IPA size: $SIZE"
          else
            echo "  BUILD FAILED"
            tail -40 build.log || true
          fi
          echo "========================================"
