name: Build GameHub iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.2'

      - name: Show Build Environment
        run: |
          xcodebuild -version
          swift --version
          echo "SDK: $(xcrun --sdk iphoneos --show-sdk-path)"

      # ===== بناء تطبيق iOS =====
      - name: Build iOS App
        run: |
          xcodebuild \
            -project GameHub.xcodeproj \
            -scheme GameHub \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

      # ===== إنشاء IPA يدوياً =====
      - name: Create IPA
        run: |
          echo "Looking for built app..."
          find build/DerivedData -name "GameHub.app" -type d 2>/dev/null || true
          find build/DerivedData -name "*.app" -type d 2>/dev/null || true
          
          APP_PATH=$(find build/DerivedData -name "GameHub.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: GameHub.app not found!"
            echo "=== Build log tail ==="
            tail -50 build.log || true
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          mkdir -p build/Payload
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r GameHub.ipa Payload/
          echo "IPA created: build/GameHub.ipa"

      # ===== رفع IPA =====
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GameHub-iOS
          path: build/GameHub.ipa
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "========================================"
          if [ -f build/GameHub.ipa ]; then
            echo "  BUILD SUCCESS!"
            echo "  IPA: Artifacts → GameHub-iOS"
          else
            echo "  BUILD FAILED"
            echo "  Check the logs above for errors"
          fi
          echo "========================================"
